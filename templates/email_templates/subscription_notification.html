<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <meta name="x-apple-disable-message-reformatting">
  <title>{{ notification_title }}</title>
  <!--[if mso]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
  <style type="text/css">
    @media only screen and (max-width: 600px) {
      .main-table { width: 100% !important; min-width: 320px !important; margin: 16px auto !important; }
      .content-padding { padding: 0 16px 20px 16px !important; }
      .intro-padding { padding: 16px 16px 20px 16px !important; }
      .footer-text { padding: 0 16px 16px 16px !important; font-size: 12px !important; }
      .mobile-font-size { font-size: 16px !important; line-height: 1.6 !important; }
      .mobile-title { font-size: 22px !important; padding-bottom: 16px !important; }
      .cta-button { display: block !important; width: 100% !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f5f6fa; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size:16px; color:#4b5563; -webkit-text-size-adjust:none; -ms-text-size-adjust:none;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f5f6fa; min-width:100%;">
    <tr>
      <td align="center" style="padding:0;">

        <!-- Main card -->
        <table class="main-table" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; margin:40px auto; max-width:600px;">

          <!-- Org name header bar -->
          <tr>
            <td align="center" style="background-color:#00ab66; padding:24px 32px;">
              <p style="margin:0; font-size:18px; font-weight:700; color:#ffffff; letter-spacing:0.3px;">{{ organization_name }}</p>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td class="mobile-title" align="center" style="font-size:22px; font-weight:700; color:#1e293b; padding:32px 32px 8px 32px;">
              {{ notification_title }}
            </td>
          </tr>

          <!-- Body content -->
          <tr>
            <td class="intro-padding mobile-font-size" style="padding:16px 40px 24px; font-size:16px; color:#475569; text-align:left; line-height:1.6;">
              <p style="margin:0 0 12px 0;">Hello <strong>{{ admin_name }}</strong>,</p>
              {{ notification_body | safe }}
            </td>
          </tr>

          <!-- CTA button -->
          {% if settings_url %}
          <tr>
            <td class="content-padding" align="center" style="padding:8px 40px 32px;">
              <a class="cta-button" href="{{ settings_url }}" target="_blank"
                 style="display:inline-block; background-color:#00ab66; color:#ffffff; font-size:16px; font-weight:600; text-decoration:none; padding:14px 36px; border-radius:6px; border:1px solid #009959;">
                View Subscription Settings
              </a>
            </td>
          </tr>
          {% endif %}

        </table>

        <!-- Legal footer -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="margin:0 auto; max-width:600px;">
          <tr>
            <td class="footer-text" align="center" style="font-size:12px; color:#9ca3af; padding:16px 32px 32px;">
              <p style="margin:0 0 6px 0;">This is a transactional email sent to <strong>{{ admin_email }}</strong>.</p>
              <p style="margin:0;">Do not reply to this email.</p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>

</body>
</html>
